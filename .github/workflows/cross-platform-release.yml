name: Cross-platform release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: unix-x64
          - os: windows-latest
            platform: windows-x64
          - os: macos-latest
            platform: macos
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out Lumi
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Compile Lumi
        shell: bash
        run: |
          mkdir -p package-input
          javac --release 17 -d package-input src/Lumi.java
          jar --create --file package-input/lumi.jar --main-class Lumi -C package-input Lumi.class -C package-input 'Lumi$ArithmeticParser.class' -C package-input 'Lumi$Block.class' -C package-input 'Lumi$ConditionalBlock.class' -C package-input 'Lumi$LumiButton.class' -C package-input 'Lumi$LumiClass.class' -C package-input 'Lumi$LumiMethod.class'

      - name: Package Unix application
        if: runner.os == 'Linux'
        shell: bash
        run: |
          jpackage \
            --type app-image \
            --dest dist \
            --input package-input \
            --main-jar lumi.jar \
            --name Lumi \
            --app-version 0.1.2 \
            --description "Lumi programming language" \
            --vendor "Lumi contributors" \
            --icon icon.png
          tar -C dist -czf Lumi-unix-x64.tar.gz Lumi

      - name: Package Windows application
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          jpackage `
            --type app-image `
            --dest dist `
            --input package-input `
            --main-jar lumi.jar `
            --name Lumi `
            --app-version 0.1.2 `
            --description "Lumi programming language" `
            --vendor "Lumi contributors" `
            --win-console
          Compress-Archive -Path dist/Lumi -DestinationPath Lumi-windows-x64.zip

      - name: Package macOS application
        if: runner.os == 'macOS'
        shell: bash
        run: |
          jpackage \
            --type app-image \
            --dest dist \
            --input package-input \
            --main-jar lumi.jar \
            --name Lumi \
            --app-version 0.1.2 \
            --description "Lumi programming language" \
            --vendor "Lumi contributors" \
            --mac-package-name Lumi \
            --mac-app-category public.app-category.developer-tools
          ditto -c -k --sequesterRsrc --keepParent dist/Lumi.app Lumi-macos.zip

      - name: Test Unix package
        if: runner.os == 'Linux'
        shell: bash
        run: dist/Lumi/bin/Lumi examples/features.lumi

      - name: Test Windows package
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./dist/Lumi/Lumi.exe examples/features.lumi

      - name: Test macOS package
        if: runner.os == 'macOS'
        shell: bash
        run: dist/Lumi.app/Contents/MacOS/Lumi examples/features.lumi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lumi-${{ matrix.platform }}
          path: Lumi-*
          if-no-files-found: error

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download native packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Lumi ${GITHUB_REF_NAME#v}" \
            --generate-notes \
            release-assets/*
